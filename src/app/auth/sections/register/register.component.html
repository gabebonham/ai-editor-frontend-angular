<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-16">
    <div class="flex flex-col gap-4">
        <div>
            <h1>Email</h1>
            <app-input id="email" type="email" formControlName="email" [class.error]="email.invalid && email.touched" icon="email" type="text" placeholder="Seu email..."></app-input>
            <span class="text-red-500" *ngIf="email.touched && email.hasError('required')">
                Email obrigatório
            </span>
        </div>
        <div>
            <h1>Username</h1>
            <app-input id="username" type="username" formControlName="username" [class.error]="username.invalid && username.touched" icon="person" type="text" placeholder="Seu Username..."></app-input>
            <span class="text-red-500" *ngIf="username.touched && username.hasError('required')">
                Username obrigatório
            </span>
        </div>
        <div>
            <h1>Senha</h1>
            <app-input id="password" type="password" formControlName="password" [class.error]="password.invalid && password.touched" icon="lock" [canToggleVisible]="true" type="text" placeholder="Sua senha..."></app-input>
            <span class="text-red-500" *ngIf="password.touched && password.hasError('required')">
                Senha obrigatória
            </span>
        </div>
        <div>
            <h1>Confirmar Senha</h1>
            <app-input id="confirmPassword" type="emaconfirmPasswordil" formControlName="confirmPassword" [class.error]="confirmPassword.invalid && confirmPassword.touched" icon="lock" [canToggleVisible]="true" type="text"
                placeholder="Confirme sua senha..."></app-input>
            <span class="text-red-500" *ngIf="confirmPassword.touched && confirmPassword.hasError('required')">
                Confirme de senha obrigatório
            </span>
        </div>
    </div>
    <div>
        <button type="submit" class="cursor-pointer w-full text-lg px-4 py-2 bg-primary text-text-white rounded-lg">
            Cadastrar
        </button>
    </div>
</form>
<div class="card flex justify-center max-w-36">
    <p-toast 
    position="bottom-center"
    [style]="{ width: '90vw', maxWidth: '360px' }">
    </p-toast>
</div>
